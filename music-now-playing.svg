<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="100%">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="50%" stop-color="#ff9f1c"/>
      <stop offset="100%" stop-color="#fb5607"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    @keyframes bar { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }
    .b1{animation:bar .9s ease-in-out infinite}
    .b2{animation:bar .8s ease-in-out infinite .1s}
    .b3{animation:bar 1.0s ease-in-out infinite .2s}
    .b4{animation:bar .7s ease-in-out infinite .15s}
    .b5{animation:bar 1.1s ease-in-out infinite .05s}
  </style>
  <rect width="1200" height="120" rx="16" fill="#170c0f"/>
  <rect x="24" y="18" width="1152" height="84" rx="12" fill="#241015" stroke="#ffd16640"/>
  <g transform="translate(52 60)">
    <rect class="b1" x="0" y="-20" width="8" height="40" rx="3" fill="url(#line)"/>
    <rect class="b2" x="14" y="-24" width="8" height="48" rx="3" fill="url(#line)"/>
    <rect class="b3" x="28" y="-16" width="8" height="32" rx="3" fill="url(#line)"/>
    <rect class="b4" x="42" y="-26" width="8" height="52" rx="3" fill="url(#line)"/>
    <rect class="b5" x="56" y="-18" width="8" height="36" rx="3" fill="url(#line)"/>
  </g>
  <text x="140" y="56" fill="#fff7ed" font-size="16" font-weight="700">Neon jukebox rotation</text>
  <text x="140" y="80" fill="#ffd7ba" font-size="14">Morgan Wallen • Ella Langley • Chris Stapleton • Porter Robinson • deadmau5</text>
  <text x="1080" y="70" text-anchor="end" fill="#ffd166" font-size="13" font-weight="700">boot-stomp approved</text>
</svg>
