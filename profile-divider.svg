      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="25%" stop-color="#ff9f1c"/>
      <stop offset="50%" stop-color="#fb5607"/>
      <stop offset="75%" stop-color="#ff006e"/>
      <stop offset="100%" stop-color="#ff4d6d"/>
